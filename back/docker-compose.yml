services:
    games-web:
        build: .
        command: ["/usr/bin/supervisord"]
        container_name: games-py
        restart: unless-stopped
        env_file:
            - .env
        volumes:
            - .:/usr/src/app
        ports:
            - "8368:8000"
        networks:
            - games-net

networks:
    games-net:
        driver: bridge
